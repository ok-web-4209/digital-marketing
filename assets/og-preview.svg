<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Design Rank Studio</title>
  <desc id="desc">Design Rank Studio — premium freelance web design, SEO, AI chatbots, and automation services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#111936"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.9" r="0.5">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand lockup -->
  <g transform="translate(80, 78)">
    <rect width="62" height="62" rx="18" fill="url(#brand)"/>
    <path fill="#ffffff" d="M31 14 L35 27 L48 31 L35 35 L31 48 L27 35 L14 31 L27 27 Z"/>
    <text x="82" y="42" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Design Rank Studio</text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="250" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800" fill="#67e8f9" letter-spacing="4">PREMIUM FREELANCE DIGITAL SERVICES</text>

  <!-- Headline -->
  <text x="78" y="330" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-2">Build a sharper</text>
  <text x="78" y="412" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-2">digital presence.</text>

  <!-- Subhead -->
  <text x="80" y="470" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Websites, SEO, UI/UX, AI chatbots, APIs &amp; automation.</text>

  <!-- Service chips -->
  <g font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">
    <g transform="translate(80, 520)">
      <rect width="178" height="54" rx="27" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="89" y="35" text-anchor="middle">Web Design</text>
    </g>
    <g transform="translate(274, 520)">
      <rect width="110" height="54" rx="27" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="55" y="35" text-anchor="middle">SEO</text>
    </g>
    <g transform="translate(400, 520)">
      <rect width="190" height="54" rx="27" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="95" y="35" text-anchor="middle">AI Chatbots</text>
    </g>
    <g transform="translate(606, 520)">
      <rect width="196" height="54" rx="27" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="98" y="35" text-anchor="middle">Automation</text>
    </g>
  </g>

  <!-- Decorative orbit ring -->
  <g transform="translate(980, 250)" opacity="0.9">
    <circle r="150" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
    <circle r="108" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
    <circle cx="150" cy="0" r="10" fill="#7c3aed"/>
    <circle cx="-108" cy="0" r="8" fill="#06b6d4"/>
    <circle cx="0" cy="-150" r="7" fill="#34d399"/>
    <circle r="60" fill="url(#brand)" opacity="0.95"/>
    <path fill="#ffffff" d="M0 -30 L8 -8 L30 0 L8 8 L0 30 L-8 8 L-30 0 L-8 -8 Z"/>
  </g>
</svg>
