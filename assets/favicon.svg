<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Design Rank Studio</title>
  <desc id="desc">Gradient rounded-square mark with an upward rank/growth arrow.</desc>
  <defs>
    <linearGradient id="drsGradient" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#08111f" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#drsGradient)" filter="url(#shadow)"/>
  <path d="M14 41 L27 28 L36 35 L50 21" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M39 21 H50 V32" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
